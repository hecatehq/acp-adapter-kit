name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: test -z "$(gofmt -l $(go list -f '{{.Dir}}' ./...))"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...

  windows-process:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test Windows process containment
        run: go test ./process
